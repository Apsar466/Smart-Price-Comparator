<!DOCTYPE html>
<html>
<head>
    <title>Smart Price Comparator</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI';
            background: linear-gradient(135deg, #1e1e2f, #3a3a5f);
            color: white;
        }

        header {
            text-align: center;
            padding: 20px;
            font-size: 28px;
            font-weight: bold;
        }

        .search-box {
            text-align: center;
            margin: 20px;
        }

        input {
            padding: 12px;
            width: 250px;
            border-radius: 25px;
            border: none;
        }

        button {
            padding: 12px 20px;
            border-radius: 25px;
            border: none;
            background: #ff7b00;
            color: white;
            cursor: pointer;
        }

        .filters label {
            margin: 5px;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 20px;
            padding: 20px;
        }

        .card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 15px;
            transition: 0.3s;
        }

        .card:first-child {
            transform: scale(1.05);
            border: 2px solid gold;
        }

        .card:hover {
            transform: translateY(-10px) scale(1.03);
        }

        .card img {
            width: 100%;
            height: 180px;
            object-fit: contain;
        }

        .price {
            font-size: 20px;
            font-weight: bold;
            color: #00ffcc;
        }

        .badge {
            padding: 5px 10px;
            border-radius: 10px;
            font-size: 12px;
            display: inline-block;
            margin-top: 5px;
        }

        .cheapest {
            background: #00c853;
            border: 2px solid #00c853;
        }

        .best {
            background: #ffea00;
            color: black;
            box-shadow: 0 0 15px #ffea00;
            border: 2px solid #ffea00;
        }

        a {
            display: block;
            margin-top: 10px;
            color: #00e5ff;
            text-decoration: none;
        }

        .chart-container {
            width: 80%;
            margin: 30px auto;
            background: rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 15px;
        }
    </style>
</head>

<body>

<header>⚡ Smart Price Comparator</header>

<div class="search-box">

    <input id="productName" placeholder="Search products...">

    <button onclick="searchProduct()">Search</button>

    <div class="filters">
        <label><input type="checkbox" value="walmart"> Walmart</label>
        <label><input type="checkbox" value="ebay"> eBay</label>
        <label><input type="checkbox" value="best buy"> Best Buy</label>
    </div>

</div>

<div id="results" class="container"></div>

<div class="chart-container">
    <canvas id="priceChart"></canvas>
</div>

<script>

let chart;

// 📊 Fake history
function generateFakeHistory(price) {
    let arr = [];
    for (let i = 5; i >= 0; i--) {
        let variation = (Math.random() * 2000) - 1000;
        arr.push(Math.max(1000, price + variation));
    }
    return arr;
}

// 📊 Chart
function renderChart(product) {

    let ctx = document.getElementById("priceChart");

    if (chart) chart.destroy();

    chart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: ["5d", "4d", "3d", "2d", "1d", "Today"],
            datasets: [{
                label: product.title,
                data: generateFakeHistory(product.price),
                borderWidth: 2,
                tension: 0.4,
                fill: true
            }]
        }
    });
}

// 🔍 Search
function searchProduct() {

    let name = document.getElementById("productName").value;
    let container = document.getElementById("results");

    container.innerHTML = "Loading... ⚡";

    let checkboxes = document.querySelectorAll("input[type=checkbox]:checked");

    let url = "http://localhost:8080/prices/live/" + name;

    if (checkboxes.length > 0) {
        let params = [];
        checkboxes.forEach(cb => {
            params.push("stores=" + cb.value);
        });
        url += "?" + params.join("&");
    }

    fetch(url)
        .then(res => res.json())
        .then(data => {

            container.innerHTML = "";

            if (data.message) {
                container.innerHTML = data.message;
                return;
            }

            // 🔥 PRIORITY SORT
            data.allProducts.sort((a, b) => {

                const isBestA = (a.title === data.bestDeal.title && a.price === data.bestDeal.price);
                const isBestB = (b.title === data.bestDeal.title && b.price === data.bestDeal.price);

                const isCheapA = (a.title === data.cheapest.title && a.price === data.cheapest.price);
                const isCheapB = (b.title === data.cheapest.title && b.price === data.cheapest.price);

                if (isBestA) return -1;
                if (isBestB) return 1;

                if (isCheapA) return -1;
                if (isCheapB) return 1;

                return a.price - b.price;
            });

            data.allProducts.forEach(p => {

                let div = document.createElement("div");
                div.classList.add("card");

                let badges = "";

                if (p.title === data.cheapest.title && p.price === data.cheapest.price) {
                    badges += `<span class="badge cheapest">💰 Cheapest</span>`;
                }

                if (p.title === data.bestDeal.title && p.price === data.bestDeal.price) {
                    badges += `<span class="badge best">⭐ Best Deal</span>`;
                }

                div.innerHTML = `
                    <img src="${p.image}" />
                    <h3>${p.title}</h3>
                    <p>${p.store}</p>
                    <p class="price">₹${p.price}</p>
                    <p>⭐ ${p.rating}</p>
                    ${badges}
                    <a href="${p.link}" target="_blank">Buy Now →</a>
                `;

                container.appendChild(div);
            });

            // 📊 Show chart for BEST DEAL
            renderChart(data.bestDeal);
        })
        .catch(() => {
            container.innerHTML = "Error ❌";
        });
}

</script>

</body>
</html>
